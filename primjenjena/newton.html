<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Numerička Analiza</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:sans-serif;background:#0f172a;color:#e2e8f0;padding:1rem}
    .grid{display:grid;grid-template-columns:1fr 2fr;gap:1rem;margin-bottom:1rem}
    .card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:1.1rem}
    .slider-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
    .slider-row label{font-size:12px;color:#94a3b8;width:120px;flex-shrink:0}
    .slider-row input{flex:1;accent-color:#3b82f6}
    .val{font-size:12px;font-weight:600;min-width:32px;text-align:right;color:#f1f5f9}
    .legend{display:flex;gap:14px;margin-top:12px;font-size:11px;color:#94a3b8}
    .legend span{display:flex;align-items:center;gap:5px}
    .dot{width:20px;height:3px;border-radius:2px;display:inline-block}
    .chart-wrap{position:relative;height:220px}
    table{width:100%;border-collapse:collapse;font-size:12px}
    th{background:#0f172a;padding:8px 12px;text-align:left;font-size:11px;color:#64748b;border-bottom:1px solid #334155}
    td{padding:6px 12px;border-bottom:1px solid #1e293b;font-family:monospace;font-size:11px}
    tr:last-child td{border-bottom:none}
    .bis{color:#f59e0b}.nwt{color:#22c55e}.sek{color:#3b82f6}.step{color:#64748b}
    h2{color:#60a5fa;font-size:14px;text-align:center;margin-bottom:12px;font-weight:500}
  </style>
</head>
<body>

  <h2>Newton vs. Bisekcija vs. Sekanta — f(x) = x² − 2</h2>

  <div class="grid">
    <div class="card">
      <div class="slider-row"><label>Interval a</label><input type="range" id="sl-a" min="0.1" max="1.4" step="0.1" value="1"><span class="val" id="out-a">1.0</span></div>
      <div class="slider-row"><label>Interval b</label><input type="range" id="sl-b" min="1.5" max="3.0" step="0.1" value="2"><span class="val" id="out-b">2.0</span></div>
      <div class="slider-row"><label>Newton x₀</label><input type="range" id="sl-x0" min="1.0" max="4.0" step="0.1" value="2"><span class="val" id="out-x0">2.0</span></div>
      <div class="slider-row"><label>Broj koraka</label><input type="range" id="sl-n" min="3" max="15" step="1" value="10"><span class="val" id="out-n">10</span></div>
      <div class="legend">
        <span><span class="dot" style="background:#f59e0b"></span>Bisekcija</span>
        <span><span class="dot" style="background:#22c55e"></span>Newton</span>
        <span><span class="dot" style="background:#3b82f6"></span>Sekanta</span>
      </div>
    </div>
    <div class="card"><div class="chart-wrap"><canvas id="chart"></canvas></div></div>
  </div>

  <div class="card">
    <table>
      <thead><tr><th>n</th><th class="bis">Bisekcija O(n)</th><th class="nwt">Newton O(n²)</th><th class="sek">Sekanta O(n^1.618)</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <script>
    const TARGET = Math.sqrt(2);
    let ci = null;
    const f  = x => x * x - 2;
    const df = x => 2 * x;

    function bisection(a, b, N) {
      const e = [];
      for (let i = 0; i < N; i++) {
        const c = (a + b) / 2;
        e.push(Math.abs(c - TARGET));
        if (f(a) * f(c) < 0) b = c; else a = c;
      }
      return e;
    }

    function newton(x, N) {
      const e = [];
      for (let i = 0; i < N; i++) {
        e.push(Math.abs(x - TARGET));
        const n = x - f(x) / df(x);
        if (!isFinite(n)) { while (e.length < N) e.push(null); break; }
        x = n;
      }
      return e;
    }

    function secant(xp, xc, N) {
      const e = [];
      for (let i = 0; i < N; i++) {
        e.push(Math.abs(xc - TARGET));
        if (f(xc) === f(xp)) { while (e.length < N) e.push(null); break; }
        const n = xc - f(xc) * (xc - xp) / (f(xc) - f(xp));
        xp = xc; xc = n;
        if (!isFinite(xc)) { while (e.length < N) e.push(null); break; }
      }
      return e;
    }

    function update() {
      const a0 = parseFloat(document.getElementById('sl-a').value);
      const b0 = parseFloat(document.getElementById('sl-b').value);
      const x0 = parseFloat(document.getElementById('sl-x0').value);
      const N  = parseInt(document.getElementById('sl-n').value);

      document.getElementById('out-a').textContent  = a0.toFixed(1);
      document.getElementById('out-b').textContent  = b0.toFixed(1);
      document.getElementById('out-x0').textContent = x0.toFixed(1);
      document.getElementById('out-n').textContent  = N;

      const bis = bisection(a0, b0, N);
      const nwt = newton(x0, N);
      const sek = secant(a0, b0, N);

      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '';
      for (let i = 0; i < N; i++) {
        tbody.innerHTML += `<tr>
          <td class="step">${i}</td>
          <td class="bis">${bis[i] != null ? bis[i].toExponential(4) : '—'}</td>
          <td class="nwt">${nwt[i] != null ? nwt[i].toExponential(4) : '—'}</td>
          <td class="sek">${sek[i] != null ? sek[i].toExponential(4) : '—'}</td>
        </tr>`;
      }

      const ctx = document.getElementById('chart').getContext('2d');
      if (ci) ci.destroy();
      ci = new Chart(ctx, {
        type: 'line',
        data: {
          labels: Array.from({ length: N }, (_, i) => i),
          datasets: [
            { label: 'Bisekcija', data: bis, borderColor: '#f59e0b', backgroundColor: 'transparent', tension: 0.1, pointRadius: 3, spanGaps: false },
            { label: 'Newton',    data: nwt, borderColor: '#22c55e', backgroundColor: 'transparent', tension: 0.1, pointRadius: 3, spanGaps: false },
            { label: 'Sekanta',   data: sek, borderColor: '#3b82f6', backgroundColor: 'transparent', tension: 0.1, pointRadius: 3, spanGaps: false }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            y: {
              type: 'logarithmic',
              title: { display: true, text: 'Pogreška |xₙ − √2|', color: '#94a3b8' },
              ticks: { color: '#64748b', callback: v => v.toExponential(0) },
              grid:  { color: 'rgba(255,255,255,0.05)' }
            },
            x: {
              ticks: { color: '#64748b' },
              grid:  { color: 'rgba(255,255,255,0.05)' }
            }
          },
          plugins: { legend: { display: false } }
        }
      });
    }

    ['sl-a', 'sl-b', 'sl-x0', 'sl-n'].forEach(id =>
      document.getElementById(id).addEventListener('input', update)
    );

    update();
  </script>

</body>
</html>
